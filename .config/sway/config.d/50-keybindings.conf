### Key bindings ###

# Basics:

    # Start a terminal
    bindsym Super+t exec $term

    # Kill focused window
    bindsym Super+q kill

    # Start your launcher
    bindsym Super+Space exec $menu

    # Start your file manager
    bindsym Super+e exec thunar

    # Reload the configuration file
    bindsym Super+Shift+r reload

    # exec script to restar waybar
    bindsym Super+Shift+w exec ~/.config/waybar/scripts/restart-waybar

    # Exit sway (logs you out of your Wayland session)
    bindsym Super+Shift+e exec swaynag -t warning -m \
    'You pressed the exit shortcut. Do you really want to exit sway? This will end your Wayland session.' \
    -B 'Yes, exit sway' 'swaymsg exit'

    # Drag floating windows by holding down $mod and left mouse button.
    # Resize them with right mouse button + $mod.
    # Despite the name, also works for non-floating windows.
    # Change normal to inverse to use left mouse button for resizing and right
    # mouse button for dragging.
    floating_modifier Super normal

# Moving around:

    # Move your focus around
    bindsym Super+$left focus left
    bindsym Super+$down focus down
    bindsym Super+$up focus up
    bindsym Super+$right focus right

    # Or use $mod+[up|down|left|right]
    bindsym Super+Left focus left
    bindsym Super+Down focus down
    bindsym Super+Up focus up
    bindsym Super+Right focus right

    # Move the focused window with the same, but add Shift
    bindsym Super+Shift+$left move left
    bindsym Super+Shift+$down move down
    bindsym Super+Shift+$up move up
    bindsym Super+Shift+$right move right
    
    # Ditto, with arrow keys
    bindsym Super+Shift+Left move left
    bindsym Super+Shift+Down move down
    bindsym Super+Shift+Up move up
    bindsym Super+Shift+Right move right

# Workspaces:

    # Switch to workspace
    bindsym Super+1 workspace number 1
    bindsym Super+2 workspace number 2
    bindsym Super+3 workspace number 3
    bindsym Super+4 workspace number 4
    bindsym Super+5 workspace number 5
    bindsym Super+6 workspace number 6
    bindsym Super+7 workspace number 7
    bindsym Super+8 workspace number 8
    bindsym Super+9 workspace number 9
    bindsym Super+0 workspace number 10
    
    # Move focused container to workspace
    bindsym Super+Shift+1 move container to workspace number 1
    bindsym Super+Shift+2 move container to workspace number 2
    bindsym Super+Shift+3 move container to workspace number 3
    bindsym Super+Shift+4 move container to workspace number 4
    bindsym Super+Shift+5 move container to workspace number 5
    bindsym Super+Shift+6 move container to workspace number 6
    bindsym Super+Shift+7 move container to workspace number 7
    bindsym Super+Shift+8 move container to workspace number 8
    bindsym Super+Shift+9 move container to workspace number 9
    bindsym Super+Shift+0 move container to workspace number 10
    # Note: workspaces can have any name you want, not just numbers.
    # We just use 1-10 as the default.

# Layout stuff:

    # You can "split" the current object of your focus with
    # $mod+b or $mod+v, for horizontal and vertical splits
    # respectively.
    bindsym Super+b splith
    bindsym Super+v splitv

    # Switch the current container between different layout styles
    #bindsym $mod+s layout stacking
    #bindsym $mod+p layout tabbed
    bindsym Super+w layout toggle split

    # Make the current focus fullscreen
    bindsym Super+f fullscreen

    # Toggle the current focus between tiling and floating mode
    bindsym Super+Shift+space floating toggle

    # Swap focus between the tiling area and the floating area
    #bindsym $mod+space focus mode_toggle

    # Move focus to the parent container
    bindsym Super+a focus parent

# Scratchpad:

    # Sway has a "scratchpad", which is a bag of holding for windows.
    # You can send windows there and get them back later.

    # Move the currently focused window to the scratchpad
    bindsym Super+Shift+minus move scratchpad

    # Show the next scratchpad window or hide the focused scratchpad window.
    # If there are multiple scratchpad windows, this command cycles through them.
    bindsym Super+minus scratchpad show

# Resizing containers:

bindsym Super+r mode "resize"

mode "resize" {
    # left will shrink the containers width
    # right will grow the containers width
    # up will shrink the containers height
    # down will grow the containers height
    bindsym $left resize shrink width 10px
    bindsym $down resize grow height 10px
    bindsym $up resize shrink height 10px
    bindsym $right resize grow width 10px

    # Ditto, with arrow keys
    bindsym Left resize shrink width 10px
    bindsym Down resize grow height 10px
    bindsym Up resize shrink height 10px
    bindsym Right resize grow width 10px

    # Return to default mode
    bindsym Return mode "default"
    bindsym Escape mode "default"
}

# Utilities:

    # Special keys to adjust volume via PulseAudio (Modify to Pipewire pactl -> wpctl)
    bindsym --locked XF86AudioMute exec wpctl set-mute @DEFAULT_SINK@ toggle
    bindsym --locked XF86AudioLowerVolume exec wpctl set-volume @DEFAULT_SINK@ 5%-
    bindsym --locked XF86AudioRaiseVolume exec wpctl set-volume -l 1.0  @DEFAULT_SINK@ 5%+
    # bindsym --locked XF86AudioMicMute exec wpctl set-source-mute \@DEFAULT_SOURCE@ toggle

    # Special keys to adjust brightness via brightnessctl
    bindsym --locked XF86MonBrightnessDown exec brightnessctl set 5%-
    bindsym --locked XF86MonBrightnessUp exec brightnessctl set 5%+

    # Special keys to take a screenshot with grim
    
    # Full screen
    bindsym Print exec ~/.config/grim/scripts/screenshot full
    
    # Specific area
    bindsym Super+Print exec ~/.config/grim/scripts/screenshot area

    # Active window
    bindsym Super+Shift+Print exec ~/.config/grim/scripts/screenshot window
    
    # Copy full screen to clipboard
    bindsym Ctrl+Print exec ~/.config/grim/scripts/screenshot full-clipboard
    
    # Copy specific area to clipboard
    bindsym Ctrl+Super+Print exec ~/.config/grim/scripts/screenshot area-clipboard

    # Copy active window to clipboard
    bindsym Ctrl+Alt+Print exec ~/.config/grim/scripts/screenshot window-clipboard

    #
    bindsym Super+Shift+s exec wl-paste | swappy -f -
