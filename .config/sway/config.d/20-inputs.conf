### Input configuration ###

# Example configuration:

#   input "2:14:SynPS/2_Synaptics_TouchPad" {
#       dwt enabled
#       tap enabled
#       natural_scroll enabled
#       middle_emulation enabled
#   }

# You can get your inputs by running: swaymsg -t get_inputs
# I recommend read `man 5 sway-input`or ArchWiki for more information about this.

### Config Mice/Mouses ###
input "type:pointer" {
    accel_profile flat
    natural_scroll disabled
    pointer_accel 0.25
    scroll_factor 0.8
    middle_emulation disabled
}

### Config Touchpad ###
input type:touchpad {
	accel_profile flat
	click_method button_areas
	drag enabled
	dwt enabled
	dwtp enabled
	middle_emulation disabled
	natural_scroll disabled
	pointer_accel 0.25
	scroll_factor 0.1
	scroll_method two_finger
	tap enabled
}

### Config Keyboard (English International) ###
input type:keyboard {
        xkb_layout us
        xkb_variant intl
}
